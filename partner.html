<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partner - PicklePal</title>

<link rel="stylesheet" href="styles.css">

<link rel="icon" href="assets/PBPP.png">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

</head>

<body>



<header class="header">

<div class="nav container">

<a href="index.html">

<img src="assets/PPL.png" class="logo">

</a>


<nav>

<a href="support.html">Support</a>
<a href="privacy.html">Privacy</a>
<a href="partner.html">Partner</a>

</nav>

</div>

</header>



<section class="support">

<img src="assets/PPIcon.png" class="hero-icon">


<h1>Be a PicklePal Partner</h1>


<p>

Enter your email to receive the enrollment form.

</p>



<div class="support-grid">


<div class="support-card">



<input
type="email"
id="partnerEmail"
placeholder="Enter your email"
class="email-input">


<br><br>


<button onclick="sendVerification()" class="cta-button">

Send Form Link

</button>


<p id="emailStatus"></p>



</div>

</div>

</section>



<footer class="footer">

<img src="assets/PPIcon.png" class="footer-icon">

<p>© 2026 PicklePal</p>

</footer>



<script>

function sendVerification(){

const email=document.getElementById("partnerEmail").value;


if(!email){

document.getElementById("emailStatus").innerText="Please enter email.";

return;

}


document.getElementById("emailStatus").innerText="Sending...";


emailjs.send(

"service_co6l94v",

"template_hyvelnk",

{

to_email:email

},

"nWidGrg1KaFfGDPZo"

)

.then(function(){

document.getElementById("emailStatus").innerText="Check your email.";

})


.catch(function(){

document.getElementById("emailStatus").innerText="Error sending email.";

});

}

</script>



</body>

</html>
